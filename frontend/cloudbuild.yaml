steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', 
           '-t', 'gcr.io/$PROJECT_ID/colcommute-frontend', 
           '--build-arg', 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}',
           '--build-arg', 'NEXT_PUBLIC_API_BASE_URL=${_NEXT_PUBLIC_API_BASE_URL}',
           '--build-arg', 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}',
           '--build-arg', 'NEXT_PUBLIC_BASE_PATH=${_NEXT_PUBLIC_BASE_PATH}',
           '.']
    dir: 'frontend'

  # Push the image to Artifact Registry (GCR)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/colcommute-frontend']
    dir: 'frontend'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'colcommute-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/colcommute-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'

images:
  - 'gcr.io/$PROJECT_ID/colcommute-frontend'

substitutions:
  _NEXT_PUBLIC_API_URL: 'CHANGE_ME'
  _NEXT_PUBLIC_API_BASE_URL: 'CHANGE_ME'
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: 'CHANGE_ME'
  _NEXT_PUBLIC_BASE_PATH: ''

options:
  logging: CLOUD_LOGGING_ONLY
